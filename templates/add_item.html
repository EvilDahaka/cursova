{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Додати товар</h2>

    <form method="post">
        <input name="name" placeholder="Назва">
        <input name="category" placeholder="Категорія">
        <input name="year" placeholder="Рік">
        <input name="price" placeholder="Ціна">
        <input name="condition" placeholder="Стан">
        <button>Додати</button>
    </form>
</div>

{% endblock %}
