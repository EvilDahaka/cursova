{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Додати товар</h2>

    <form method="post">

        <input name="name" placeholder="Назва" required>

        <select name="category_id" required>
            <option value="">Оберіть категорію</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>

        <input name="year" placeholder="Рік" type="number" required>
        <input name="price" placeholder="Ціна" type="number" step="0.01" required>
        <input name="condition" placeholder="Стан" required>

        <button type="submit">Додати</button>
    </form>

</div>

{% endblock %}
