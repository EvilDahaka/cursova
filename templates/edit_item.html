{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Редагувати товар</h2>

    <form method="post">

        <input name="name" value="{{ item.name }}" required>

        <select name="category_id">
            {% for cat in categories %}
            <option value="{{ cat.id }}" 
                {% if cat.id == item.category_id %}selected{% endif %}>
                {{ cat.name }}
            </option>
            {% endfor %}
        </select>

        <input name="year" type="number" value="{{ item.year }}" required>
        <input name="price" type="number" step="0.01" value="{{ item.price }}" required>
        <input name="condition" value="{{ item.condition }}" required>

        <button>Зберегти</button>
    </form>

</div>

{% endblock %}
