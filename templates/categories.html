{% extends "base.html" %}

{% block content %}

<h2>Категорії</h2>

<!-- Форма додавання категорії -->
<form method="POST" action="/categories/add" style="margin-bottom: 20px;">
    <input type="text" name="name" placeholder="Назва категорії" required>
    <button type="submit">Додати</button>
</form>

<!-- Список категорій -->
<table border="1" cellpadding="10" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Назва</th>
        <th>Дії</th>
    </tr>

    {% for category in categories %}
    <tr>
        <td>{{ category.id }}</td>
        <td>{{ category.name }}</td>
        <td>
            <a href="/categories/delete/{{ category.id }}" onclick="return confirm('Видалити категорію?')">
                Видалити
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
