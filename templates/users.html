{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Користувачі</h2>

    <form method="post">
        <input name="username" placeholder="Логін" required>
        <input name="password" placeholder="Пароль" required>
        <button>Додати</button>
    </form>

    <ul>
        {% for user in users %}
        <li>
            {{ user.username }}
            <a href="/users/delete/{{ user.id }}" onclick="return confirm('Видалити?')">❌</a>
        </li>
        {% endfor %}
    </ul>

</div>

{% endblock %}
