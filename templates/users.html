{% extends "base.html" %}

{% block content %}

<h2>Користувачі</h2>

<!-- Форма створення користувача -->
<form method="POST" action="/users/add" style="margin-bottom: 20px;">
    <input type="text" name="username" placeholder="Логін" required>
    <input type="password" name="password" placeholder="Пароль" required>

    <label>
        <input type="checkbox" name="is_admin" value="1">
        Адмін
    </label>

    <button type="submit">Створити</button>
</form>

<!-- Список користувачів -->
<table border="1" cellpadding="10" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Логін</th>
        <th>Роль</th>
        <th>Дії</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>
            {% if user.is_admin %}
                Адмін
            {% else %}
                Користувач
            {% endif %}
        </td>
        <td>
            <a href="/users/delete/{{ user.id }}" onclick="return confirm('Видалити користувача?')">
                Видалити
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
