{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Список товарів</h2>

    <form action="/search">
        <input name="q" placeholder="Пошук...">
        <button>Знайти</button>
    </form>

    <table>
        <tr>
            <th>Назва</th>
            <th>Категорія</th>
            <th>Рік</th>
            <th>Ціна</th>
            <th>Стан</th>
            <th>Дії</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.year }}</td>
            <td>{{ item.price }}</td>
            <td>{{ item.condition }}</td>
            <td>
                <a href="/edit/{{ item.id }}">✏️</a>
                <a href="/delete/{{ item.id }}">❌</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

{% endblock %}
